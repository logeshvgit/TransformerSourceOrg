<template>
    <lightning-card title="PrintCo service health" icon-name="standard:account">
        <template if:true={error}>
            <div class="slds-p-around_medium slds-text-color_error">
                Unable to load account metrics. Check field-level access for this profile.
            </div>
        </template>

        <template if:false={error}>
            <template if:true={loading}>
                <div class="slds-p-around_medium slds-align_absolute-center">
                    <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
                </div>
            </template>

            <template if:false={loading}>
                <template if:true={hasData}>
                    <div class="slds-p-around_medium">
                        <p class="slds-text-heading_small slds-m-bottom_small">{accountName}</p>

                        <div class="pc-badges slds-m-bottom_medium">
                            <lightning-badge label={tierLabel} class="pc-badge-tier"></lightning-badge>
                            <lightning-badge label={statusLabel} class="pc-badge-status"></lightning-badge>
                        </div>

                        <dl class="slds-dl_horizontal slds-wrap">
                            <dt class="slds-item_label slds-text-color_weak slds-truncate">Last service date</dt>
                            <dd class="slds-item_detail slds-truncate">
                                <template if:true={lastServiceDate}>{lastServiceDate}</template>
                                <template if:false={lastServiceDate}>—</template>
                            </dd>

                            <dt class="slds-item_label slds-text-color_weak slds-truncate">Closed support cases</dt>
                            <dd class="slds-item_detail">{closedCases}</dd>

                            <dt class="slds-item_label slds-text-color_weak slds-truncate">CSM</dt>
                            <dd class="slds-item_detail">
                                <template if:true={csmName}>
                                    <a href="#" onclick={handleOpenCsm}>{csmName}</a>
                                </template>
                                <template if:false={csmName}>—</template>
                            </dd>
                        </dl>

                        <div class="pc-priority slds-m-top_medium slds-p-around_small">
                            <p class="slds-text-title_caps slds-m-bottom_xx-small">Expected case priority</p>
                            <div class="pc-priority-row">
                                <lightning-badge label={priorityPreview.value} class="pc-priority-badge"></lightning-badge>
                                <span class="slds-text-body_small slds-m-left_small">{priorityPreview.reason}</span>
                            </div>
                            <p class="slds-text-body_small slds-m-top_x-small slds-text-color_weak">
                                Matches the Case Priority Handler flow on new cases for this account.
                            </p>
                        </div>
                    </div>
                </template>
            </template>
        </template>
    </lightning-card>
</template>
